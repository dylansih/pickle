<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>The Lucidity Terminal</title>
  <link rel="stylesheet" href="css/style.css" />

  <!--
    Neue Television is the intended display face. It's commercial, so
    visitors who don't have it installed locally fall through to Anton
    (Google Fonts) — a tall condensed display sans with the same retro
    editorial feel.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet" />

  <!--
    Three.js is loaded from the unpkg CDN via an import map so the project
    works on GitHub Pages with zero build step. If you'd rather host
    three.js yourself, copy three.js-master/build/three.module.js and
    three.js-master/examples/jsm/ into a local /vendor folder and change
    the URLs below to "./vendor/three.module.js" and "./vendor/jsm/".
  -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

  <div id="app"></div>

  <div class="hud">drag to look around</div>

  <!-- ?v= query param: bump whenever js/main.js or js/postfx.js change so
       browsers (and GitHub Pages' CDN) refetch instead of running stale code. -->
  <script type="module" src="js/main.js?v=8"></script>
</body>
</html>
