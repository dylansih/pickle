<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Storyline</title>
<style>
  :root {
    --bg:        #ece4d2;     /* off-white / beige paper */
    --ink:       #2a2620;
    --ink-soft:  #5a5247;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--ink);
    font-family: "Times New Roman", Georgia, serif;
    -webkit-font-smoothing: antialiased;
    cursor: grab;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  body.dragging { cursor: grabbing; }

  /* prevent native drag-to-save and text selection on every media element */
  img, video {
    -webkit-user-drag: none;
    user-drag: none;
    -webkit-user-select: none;
    user-select: none;
    pointer-events: none;        /* let mouse events fall through to stage */
  }

  /* ---------- stage: 3D perspective + SVG fisheye ---------- */
  .stage {
    position: fixed;
    inset: 0;
    perspective: 1600px;
    perspective-origin: 50% 50%;
    overflow: hidden;
    will-change: filter;
    filter: url(#fisheye);
  }

  /* ---------- world: the giant pannable plane ---------- */
  .world {
    position: absolute;
    width: 2400px;
    height: 1100px;
    left: 50%;
    top: 50%;
    transform-origin: 50% 50%;
    transform-style: preserve-3d;
    will-change: transform;
  }

  /* ---------- media tiles (no polaroid border, just the screen) ---------- */
  .block {
    position: absolute;
  }
  .block.media {
    overflow: hidden;
    background: #1a1610;
    box-shadow: 0 6px 20px rgba(40, 25, 10, 0.18);
  }
  .block.media img,
  .block.media video {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    /* the vintage film look — sepia tone, lower saturation, slight contrast,
       a touch of warm hue shift */
    filter:
      sepia(0.32)
      saturate(0.78)
      contrast(0.96)
      brightness(0.97)
      hue-rotate(-6deg);
  }

  /* per-tile vignette + warm color cast (the "old film" tint),
     painted on top of the media via an absolutely-positioned overlay */
  .block.media::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(120% 100% at 50% 50%,
        rgba(0,0,0,0) 55%,
        rgba(40,25,10,0.18) 88%,
        rgba(40,25,10,0.36) 100%),
      linear-gradient(180deg,
        rgba(255, 220, 170, 0.06) 0%,
        rgba(120,  80,  40, 0.10) 100%);
    mix-blend-mode: multiply;
    z-index: 2;
  }
  /* faint scratchy line texture per tile */
  .block.media::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 3;
    background:
      repeating-linear-gradient(90deg,
        rgba(255,240,210,0.04) 0px,
        rgba(255,240,210,0.04) 1px,
        transparent 1px,
        transparent 4px);
    mix-blend-mode: overlay;
  }

  /* ---------- spherical edge darkening ---------- */
  .edge {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(120% 90% at 50% 50%,
        rgba(0,0,0,0) 50%,
        rgba(60,45,25,0.22) 80%,
        rgba(40,28,15,0.55) 100%);
    z-index: 50;
  }

  /* paper / scanline texture (very subtle) */
  .paper {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      repeating-linear-gradient(0deg,
        rgba(120,90,50,0.025) 0px,
        rgba(120,90,50,0.025) 1px,
        transparent 1px,
        transparent 3px);
    mix-blend-mode: multiply;
    z-index: 55;
  }

  /* film grain canvas — fine, subtle */
  .grain {
    position: fixed;
    inset: -10%;
    width: 120%;
    height: 120%;
    pointer-events: none;
    opacity: 0.32;
    mix-blend-mode: multiply;
    z-index: 60;
  }
  .specks {
    position: fixed;
    inset: -10%;
    width: 120%;
    height: 120%;
    pointer-events: none;
    opacity: 0.5;
    mix-blend-mode: screen;
    z-index: 61;
  }

  .hud {
    position: fixed;
    left: 24px;
    bottom: 20px;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--ink-soft);
    z-index: 70;
    pointer-events: none;
    opacity: 0.7;
  }
</style>
</head>
<body>

  <!-- ============ SVG FISHEYE FILTER ============ -->
  <!-- The displacement map is a real PNG (disp.png) — required for Safari,
       which silently drops <feImage href="data:..."> from a canvas. -->
  <svg width="0" height="0" style="position:absolute"
       xmlns="http://www.w3.org/2000/svg"
       xmlns:xlink="http://www.w3.org/1999/xlink"
       aria-hidden="true">
    <defs>
      <filter id="fisheye"
              x="-2%" y="-2%" width="104%" height="104%"
              filterUnits="objectBoundingBox"
              primitiveUnits="userSpaceOnUse"
              color-interpolation-filters="sRGB">
        <feImage href="disp.png" xlink:href="disp.png"
                 preserveAspectRatio="none"
                 x="0" y="0" width="100%" height="100%" result="map" />
        <feDisplacementMap in="SourceGraphic" in2="map"
                           scale="320"
                           xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </defs>
  </svg>

  <!-- ============ STAGE / WORLD ============ -->
  <div class="stage" id="stage">
    <div class="world" id="world">

      <!-- ========================================================
           CONTENT — 24 axis-aligned tiles packed into a 4-row
           by 6-column grid on a 3200×1700 plane. Viewport opens
           centered on (1600, 850) so 4 tiles are immediately
           visible and neighboring tiles peek in as you pan.
           ======================================================== -->

      <!-- ===== ROW 0 ===== -->

        <video src="media/IMG_0045.m4v" autoplay muted loop playsinline></video>
      </div>

        <img src="media/DSC00086.jpg" alt="" draggable="false" />

      <div class="block media" style="left:1210px; top:  60px; width: 240px; height: 160px;">
        <img src="media/DSC03353.jpg" alt="" draggable="false" />
      </div>
      <div class="block media" style="left:1480px; top:  40px; width: 280px; height: 190px;">
        <video src="media/IMG_2569.m4v" autoplay muted loop playsinline></video>
      </div>
      <div class="block media" style="left:1790px; top:  70px; width: 220px; height: 150px;">
        <img src="media/DSC03383.jpg" alt="" draggable="false" />
      </div>
      <div class="block media" style="left:2040px; top:  60px; width: 320px; height: 220px;">
        <img src="media/IMG_3769.jpg" alt="" draggable="false" />
      </div>

      <!-- ===== ROW 1 ===== -->
      <div class="block media" style="left:  50px; top: 280px; width: 240px; height: 160px;">
        <img src="media/DSC_0153.jpg" alt="" draggable="false" />
      </div>
      <div class="block media" style="left: 320px; top: 270px; width: 320px; height: 220px;">
        <img src="media/IMG_5519.jpg" alt="" draggable="false" />
      </div>
      <div class="block media" style="left: 670px; top: 290px; width: 280px; height: 190px;">

      </div>
      <div class="block media" style="left: 980px; top: 290px; width: 220px; height: 150px;">

      </div>
      <div class="block media" style="left:1230px; top: 270px; width: 320px; height: 220px;">

      </div>
      <div class="block media" style="left:1580px; top: 290px; width: 240px; height: 160px;">

      </div>

      <!-- ===== ROW 2 ===== -->
      <div class="block media" style="left:  30px; top: 510px; width: 320px; height: 220px;">

      </div>
      <div class="block media" style="left: 650px; top: 520px; width: 280px; height: 190px;">
        <video src="media/IMG_3439.m4v" autoplay muted loop playsinline></video>
      </div>
      <div class="block media" style="left: 960px; top: 520px; width: 280px; height: 190px;">
        <video src="media/IMG_3421.m4v" autoplay muted loop playsinline></video>
      </div>
      <div class="block media" style="left:1270px; top: 530px; width: 240px; height: 160px;">
        <img src="media/IMG_3839.jpg" alt="" draggable="false" />
      </div>
      <div class="block media" style="left:1540px; top: 510px; width: 320px; height: 220px;">
        <img src="media/IMG_4001.jpg" alt="" draggable="false" />
      </div>
      <div class="block media" style="left:1890px; top: 530px; width: 240px; height: 160px;">
        <img src="media/IMG_6369.jpg" alt="" draggable="false" />
      </div>

      <!-- ===== ROW 3 (just two videos to anchor the bottom) ===== -->
      <div class="block media" style="left: 720px; top: 770px; width: 320px; height: 220px;">
        <video src="media/IMG_3562.m4v" autoplay muted loop playsinline></video>
      </div>
      <div class="block media" style="left:1080px; top: 770px; width: 320px; height: 220px;">
        <video src="media/IMG_7869.m4v" autoplay muted loop playsinline></video>
      </div>

      <!-- ===== END CONTENT ===== -->
    </div>
  </div>

  <div class="edge"></div>
  <div class="paper"></div>
  <canvas class="grain"  id="grain"></canvas>
  <canvas class="specks" id="specks"></canvas>

  <div class="hud">drag to look around</div>

<script>
(() => {
  // ---------- 1. PAN / DRAG ----------
  const stage = document.getElementById('stage');
  const world = document.getElementById('world');

  let x = 0, y = 0;
  let tx = 0, ty = 0;

  const WORLD_W = 2400, WORLD_H = 1100;
  function bounds() {
    return {
      maxX: Math.max(0, (WORLD_W - window.innerWidth)  / 2),
      maxY: Math.max(0, (WORLD_H - window.innerHeight) / 2),
    };
  }
  const clamp = (v, m) => Math.max(-m, Math.min(m, v));

  let dragging = false, lastX = 0, lastY = 0;
  const pt = e => e.touches && e.touches[0]
    ? { x: e.touches[0].clientX, y: e.touches[0].clientY }
    : { x: e.clientX, y: e.clientY };

  function onDown(e) {
    // also kills the browser's native image-drag behavior at the source
    e.preventDefault();
    dragging = true;
    document.body.classList.add('dragging');
    const p = pt(e); lastX = p.x; lastY = p.y;
  }
  function onMove(e) {
    if (!dragging) return;
    const p = pt(e);
    const dx = p.x - lastX, dy = p.y - lastY;
    lastX = p.x; lastY = p.y;
    const b = bounds();
    tx = clamp(tx + dx, b.maxX);
    ty = clamp(ty + dy, b.maxY);
  }
  function onUp() {
    dragging = false;
    document.body.classList.remove('dragging');
  }

  // belt-and-braces: cancel native drag-and-drop if it ever fires
  window.addEventListener('dragstart', e => e.preventDefault());

  stage.addEventListener('mousedown', onDown);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
  stage.addEventListener('touchstart', onDown, { passive: false });
  window.addEventListener('touchmove', onMove, { passive: true });
  window.addEventListener('touchend', onUp);

  // ---------- 2. RENDER LOOP ----------
  function render() {
    x += (tx - x) * 0.11;
    y += (ty - y) * 0.11;

    // pure pan, no global tilt — the SVG fisheye does all the warping
    world.style.transform =
      `translate(-50%, -50%) translate3d(${x}px, ${y}px, 0)`;

    requestAnimationFrame(render);
  }
  render();

  // ---------- 3. FILM GRAIN ----------
  const grain  = document.getElementById('grain');
  const specks = document.getElementById('specks');
  const gctx = grain.getContext('2d');
  const sctx = specks.getContext('2d');

  function sizeCanvases() {
    const w = Math.ceil(window.innerWidth  * 1.2);
    const h = Math.ceil(window.innerHeight * 1.2);
    grain.width  = specks.width  = w;
    grain.height = specks.height = h;
  }

  function paintGrain() {
    const w = grain.width, h = grain.height;
    const img = gctx.createImageData(w, h);
    const d = img.data;
    for (let i = 0; i < d.length; i += 4) {
      const v = (Math.random() * 255) | 0;
      d[i] = v; d[i+1] = v; d[i+2] = v;
      d[i+3] = 32;
    }
    gctx.putImageData(img, 0, 0);
  }

  function paintSpecks() {
    const w = specks.width, h = specks.height;
    sctx.clearRect(0, 0, w, h);
    const count = Math.floor((w * h) / 9000);
    for (let i = 0; i < count; i++) {
      const sx = Math.random() * w;
      const sy = Math.random() * h;
      const r  = Math.random() * 1.2 + 0.3;
      sctx.fillStyle =
        `rgba(255,250,235,${0.30 + Math.random() * 0.45})`;
      sctx.beginPath();
      sctx.arc(sx, sy, r, 0, Math.PI * 2);
      sctx.fill();
    }
  }

  sizeCanvases();
  paintGrain();
  paintSpecks();
  setInterval(paintGrain,  70);
  setInterval(paintSpecks, 160);
  window.addEventListener('resize', () => {
    sizeCanvases(); paintGrain(); paintSpecks();
  });
})();
</script>
</body>
</html>
